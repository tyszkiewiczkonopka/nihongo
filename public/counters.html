<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nihongo Dojo — Counters</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/favicon.png" />
  <meta name="apple-mobile-web-app-title" content="Nihongo Dojo" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#F2EDE1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <div class="wrap">
    <div class="container quiz-container">
      <header class="quiz-header">
        <a class="brand-home" href="./"><img class="brand-logo" src="favicon.png" alt="" /> Nihongo Dojo</a>
        <a class="hint-link" id="hintLink" target="_blank" rel="noopener" aria-label="Reference notes" title="Reference notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 5a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2V5Z" />
            <path d="M20 5a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2V5Z" />
          </svg>
        </a>
      </header>
      <nav class="quiz-tabs">
        <a class="quiz-tab" href="numbers">Numbers</a>
        <a class="quiz-tab active" href="counters">Counters</a>
      </nav>

      <div class="controls">
        <div class="mode-toggle counter-toggle">
          <button class="mode-btn counter-btn active" data-counter="hours" onclick="setCounter('hours')">Hours</button>
          <button class="mode-btn counter-btn" data-counter="age" onclick="setCounter('age')">Age</button>
          <button class="mode-btn counter-btn" data-counter="class" onclick="setCounter('class')">Class</button>
        </div>
      </div>
      <div class="mode-toggle direction-toggle">
        <button class="mode-btn active" id="modeVal" onclick="setMode('val')" aria-label="Value to Japanese">123 → <span class="jp">日本語</span></button>
        <button class="mode-btn" id="modeJp" onclick="setMode('jp')" aria-label="Japanese to value"><span class="jp">日本語</span> → 123</button>
      </div>

      <div class="card">
        <div class="number-display" id="numDisplay">—</div>
        <div class="unit-label" id="unitLabel"></div>
        <div class="sub-hint" id="subHint"></div>
      </div>

      <div class="input-row">
        <input type="text" id="answerInput" placeholder="type your answer…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
        <button class="btn-primary check-btn" id="checkBtn" onclick="checkAnswer()">Check</button>
      </div>
      <div class="feedback" id="feedback"></div>

      <div class="stats">
        <span class="stat"><span class="stat-num" id="statCorrect">0</span> <span class="stat-label">correct</span></span>
        <span class="stats-divider">·</span>
        <span class="stat"><span class="stat-num" id="statWrong">0</span> <span class="stat-label">wrong</span></span>
      </div>
    </div>
  </div>

  <script src="notes.js"></script>
  <script src="quiz-feedback.js"></script>
  <script>
    const note = NOTES.find(n => n.id === 'counters-reference');
    document.getElementById('hintLink').href = note.href;

    const tensPrefixR = {0:'',1:'juu',2:'nijuu',3:'sanjuu',4:'yonjuu',5:'gojuu',6:'rokujuu',7:'nanajuu',8:'hachijuu',9:'kyuujuu'};

    const hourR = {1:'ichiji',2:'niji',3:'sanji',4:'yoji',5:'goji',6:'rokuji',7:'shichiji',8:'hachiji',9:'kuji',10:'juuji',11:'juuichiji',12:'juuniji'};
    const minTensPrefixR = {0:'',1:'juu',2:'nijuu',3:'sanjuu',4:'yonjuu',5:'gojuu'};
    const minOnesR = {1:'ippun',2:'nifun',3:'sanpun',4:'yonpun',5:'gofun',6:'roppun',7:'nanafun',8:'happun',9:'kyuufun'};
    const minTensZeroR = {1:'juppun',2:'nijuppun',3:'sanjuppun',4:'yonjuppun',5:'gojuppun'};
    const ampmR = { am: 'gozen', pm: 'gogo' };

    const ageOnesR = {1:'issai',2:'nisai',3:'sansai',4:'yonsai',5:'gosai',6:'rokusai',7:'nanasai',8:'hassai',9:'kyuusai'};
    const ageTensZeroR = {1:'jussai',2:'nijussai',3:'sanjussai',4:'yonjussai',5:'gojussai',6:'rokujussai',7:'nanajussai',8:'hachijussai',9:'kyuujussai'};

    const classR = {1:'ichi',2:'ni',3:'san',4:'yo',5:'go',6:'roku',7:'shichi',8:'hachi',9:'kyuu'};

    const digitsK = ['','一','二','三','四','五','六','七','八','九'];
    const ampmK = { am: '午前', pm: '午後' };

    function kanjiNum(n) {
      if (n <= 0) return '';
      if (n < 10) return digitsK[n];
      const t = Math.floor(n / 10), u = n % 10;
      let s = t === 1 ? '十' : (t > 1 ? digitsK[t] + '十' : '');
      if (u) s += digitsK[u];
      return s;
    }

    function minutesK(m) {
      if (m === 0) return '';
      return kanjiNum(m) + '分';
    }

    function minutesR(m) {
      if (m === 0) return '';
      const t = Math.floor(m / 10), u = m % 10;
      if (u === 0) return minTensZeroR[t];
      return minTensPrefixR[t] + minOnesR[u];
    }

    function ageR(n) {
      if (n === 20) return ['hatachi', 'nijussai'];
      const t = Math.floor(n / 10), u = n % 10;
      if (u === 0) return [ageTensZeroR[t]];
      if (t === 0) return [ageOnesR[u]];
      return [tensPrefixR[t] + ageOnesR[u]];
    }

    function classYearR(n) { return classR[n] + 'nensei'; }

    const counters = {
      hours: {
        label: 'hours',
        min: 1, max: 12,
        useAmPm: true,
        randRange() { return Math.floor(Math.random() * 12) + 1; },
        toRomaji(h, ap) {
          const mm = this._m;
          const prefix = ap ? ampmR[ap] : '';
          const answers = new Set();
          answers.add([prefix, hourR[h], minutesR(mm)].filter(Boolean).join(' '));
          if (mm === 30) answers.add([prefix, hourR[h], 'han'].filter(Boolean).join(' '));
          return [...answers];
        },
        toKanji(h, ap) {
          const mm = this._m;
          const prefix = ap ? ampmK[ap] : '';
          return prefix + kanjiNum(h) + '時' + minutesK(mm) + (mm === 30 ? '（半）' : '');
        },
        displayValue(h, ap) {
          const mm = String(this._m).padStart(2, '0');
          const badge = ap ? '<span class="ampm-badge">' + ap.toUpperCase() + '</span>' : '';
          return { html: '<span>' + h + ':' + mm + '</span>' + badge, unit: '' };
        },
        jpAnswers(h, ap) {
          const mm = String(this._m).padStart(2, '0');
          const base = h + ':' + mm;
          return ap ? [ap + base, base + ap] : [base];
        },
        jpDisplay(h, ap) {
          const mm = String(this._m).padStart(2, '0');
          return ap ? ap.toUpperCase() + ' ' + h + ':' + mm : h + ':' + mm;
        },
        placeholderVal(ap) { return ap ? 'e.g. gozen ichiji sanjuugofun' : 'e.g. ichiji sanjuugofun'; },
        placeholderJp(ap) { return ap ? 'e.g. AM 1:35' : 'e.g. 1:35'; }
      },
      age: {
        label: 'age',
        min: 1, max: 99,
        useAmPm: false,
        randRange() { return Math.floor(Math.random() * 99) + 1; },
        toRomaji(n) { return ageR(n); },
        toKanji(n) { return kanjiNum(n) + '歳'; },
        displayValue(n) { return { html: '<span>' + n + '</span>', unit: 'years old' }; },
        jpAnswers(n) { return [String(n)]; },
        jpDisplay(n) { return String(n); },
        placeholderVal() { return 'e.g. nijussai'; },
        placeholderJp() { return 'type the age…'; }
      },
      class: {
        label: 'class year',
        min: 1, max: 6,
        useAmPm: false,
        randRange() { return Math.floor(Math.random() * 6) + 1; },
        toRomaji(n) { return [classYearR(n)]; },
        toKanji(n) { return kanjiNum(n) + '年生'; },
        displayValue(n) { return { html: '<span>' + n + '</span>', unit: 'grade / year' }; },
        jpAnswers(n) { return [String(n)]; },
        jpDisplay(n) { return String(n); },
        placeholderVal() { return 'e.g. sannensei'; },
        placeholderJp() { return 'type the year…'; }
      }
    };

    let counterId = 'hours';
    let mode = 'val';
    let curVal = 1, curAp = null;
    let correct = 0, wrong = 0;
    let answered = false;

    function activeCounter() { return counters[counterId]; }

    function setCounter(id) {
      counterId = id;
      document.querySelectorAll('.counter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.counter === id);
      });
      nextQuestion();
    }

    function setMode(m) {
      mode = m;
      document.getElementById('modeVal').classList.toggle('active', m === 'val');
      document.getElementById('modeJp').classList.toggle('active', m === 'jp');
      nextQuestion();
    }

    function nextQuestion() {
      const c = activeCounter();
      curVal = c.randRange();
      curAp = c.useAmPm ? (Math.random() < 0.5 ? null : (Math.random() < 0.5 ? 'am' : 'pm')) : null;
      if (c === counters.hours) c._m = Math.floor(Math.random() * 60);

      answered = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('subHint').textContent = '';
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').disabled = false;
      document.getElementById('answerInput').readOnly = false;
      document.getElementById('checkBtn').textContent = 'Check';

      if (mode === 'val') {
        const d = c.displayValue(curVal, curAp);
        document.getElementById('numDisplay').innerHTML = d.html;
        document.getElementById('unitLabel').textContent = d.unit;
        document.getElementById('answerInput').placeholder = c.placeholderVal(curAp);
      } else {
        document.getElementById('numDisplay').textContent = c.toKanji(curVal, curAp);
        document.getElementById('unitLabel').textContent = '';
        document.getElementById('answerInput').placeholder = c.placeholderJp(curAp);
      }
      document.getElementById('answerInput').focus();
    }

    function normalize(s) {
      return s.trim().toLowerCase().replace(/\s+/g, '');
    }

    function checkAnswer() {
      if (answered) { nextQuestion(); return; }
      const raw = document.getElementById('answerInput').value;
      answered = true;
      document.getElementById('answerInput').readOnly = true;
      document.getElementById('checkBtn').textContent = 'Next →';

      const c = activeCounter();
      let isCorrect = false;
      let mainHtml = '';
      let romajiText = '';

      if (mode === 'val') {
        const answers = c.toRomaji(curVal, curAp);
        isCorrect = answers.some(a => normalize(a) === normalize(raw));
        document.getElementById('subHint').textContent = c.toKanji(curVal, curAp);
        mainHtml = isCorrect ? '正解！ Correct!' : diffHighlight(pickClosestVariant(answers, raw, normalize), raw, normalize);
      } else {
        const answers = c.jpAnswers(curVal, curAp);
        isCorrect = answers.some(a => normalize(a) === normalize(raw));
        mainHtml = isCorrect ? '正解！ Correct!' : diffHighlight(c.jpDisplay(curVal, curAp), raw, normalize);
        romajiText = c.toRomaji(curVal, curAp)[0];
      }

      document.getElementById('feedback').innerHTML = feedbackHtml(mainHtml, romajiText);
      document.getElementById('feedback').className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
      if (isCorrect) { correct++; } else { wrong++; }
      document.getElementById('statCorrect').textContent = correct;
      document.getElementById('statWrong').textContent = wrong;
    }

    document.getElementById('answerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });

    setCounter('hours');
  </script>
</body>
</html>
