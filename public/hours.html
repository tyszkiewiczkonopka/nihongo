<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Japanese Hours Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1a1a18;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1.25rem;
      color: #1a1a18;
    }

    .home-link {
      display: inline-block;
      font-size: 13px;
      color: #1a56db;
      text-decoration: none;
      margin-bottom: 0.75rem;
    }

    .home-link:hover { text-decoration: underline; }

    .mode-toggle {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .mode-btn {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 8px;
      border: 1px solid #d0d0c8;
      background: #f5f5f0;
      color: #666;
      cursor: pointer;
      transition: all 0.15s;
    }

    .mode-btn.active {
      background: #e8f0fe;
      color: #1a56db;
      border-color: #a4c0f4;
    }

    .card {
      background: #f9f9f6;
      border-radius: 12px;
      padding: 2rem 1rem;
      text-align: center;
      margin-bottom: 1rem;
      min-height: 140px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .prompt-label {
      font-size: 12px;
      color: #888;
    }

    .number-display {
      font-size: 56px;
      font-weight: 500;
      line-height: 1.1;
      color: #1a1a18;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .ampm-badge {
      font-size: 16px;
      font-weight: 500;
      color: #1a56db;
      background: #e8f0fe;
      padding: 3px 10px;
      border-radius: 8px;
    }

    .sub-hint {
      font-size: 20px;
      color: #555;
      min-height: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 0.75rem;
    }

    input[type="text"] {
      flex: 1;
      font-size: 18px;
      text-align: center;
      padding: 10px;
      border: 1px solid #d0d0c8;
      border-radius: 8px;
      background: #fff;
      color: #1a1a18;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #1a56db; }

    button {
      font-size: 14px;
      padding: 10px 18px;
      border-radius: 8px;
      border: 1px solid #d0d0c8;
      background: #fff;
      color: #1a1a18;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }

    button:hover { background: #f0f0ea; }

    .next-btn {
      width: 100%;
      margin-top: 6px;
    }

    .feedback {
      min-height: 32px;
      font-size: 15px;
      font-weight: 500;
      text-align: center;
      border-radius: 8px;
      padding: 6px 0;
      margin-bottom: 4px;
    }

    .feedback.correct { color: #166534; background: #dcfce7; }
    .feedback.wrong   { color: #991b1b; background: #fee2e2; }

    .accepted {
      font-size: 12px;
      color: #888;
      text-align: center;
      min-height: 18px;
      margin-bottom: 2px;
    }

    .stats {
      display: flex;
      gap: 10px;
      margin-top: 1.5rem;
    }

    .stat {
      flex: 1;
      background: #f5f5f0;
      border-radius: 8px;
      padding: 0.75rem;
      text-align: center;
    }

    .stat-num {
      font-size: 22px;
      font-weight: 500;
    }

    .stat-label {
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0f0ea; }
      .container { background: #2a2a26; box-shadow: none; }
      .card { background: #222220; }
      .number-display { color: #f0f0ea; }
      .sub-hint { color: #aaa; }
      button, input[type="text"] {
        background: #333330; border-color: #444440; color: #f0f0ea;
      }
      button:hover { background: #3a3a36; }
      .mode-btn { background: #333330; color: #aaa; border-color: #444440; }
      .mode-btn.active { background: #1e3a6e; color: #93b4f5; border-color: #2d5299; }
      .ampm-badge { background: #1e3a6e; color: #93b4f5; }
      .stat { background: #222220; }
      h1 { color: #f0f0ea; }
      .home-link { color: #93b4f5; }
    }
  </style>
</head>
<body>
  <div class="container">
    <a class="home-link" href="./">← Home</a>
    <h1>Japanese hours quiz 🕐</h1>

    <div class="mode-toggle">
      <button class="mode-btn active" id="modeTime" onclick="setMode('time')">Time → Japanese</button>
      <button class="mode-btn" id="modeJp" onclick="setMode('jp')">Japanese → Time</button>
    </div>

    <div class="card">
      <div class="prompt-label" id="promptLabel">What time is this in Japanese?</div>
      <div class="number-display" id="numDisplay">—</div>
      <div class="sub-hint" id="subHint"></div>
    </div>

    <div class="input-row">
      <input type="text" id="answerInput" placeholder="type your answer…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" />
      <button onclick="checkAnswer()">Check</button>
    </div>
    <div class="feedback" id="feedback"></div>
    <div class="accepted" id="acceptedLabel"></div>
    <button class="next-btn" onclick="nextQuestion()">Next →</button>

    <div class="stats">
      <div class="stat"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">correct</div></div>
      <div class="stat"><div class="stat-num" id="statWrong">0</div><div class="stat-label">wrong</div></div>
      <div class="stat"><div class="stat-num" id="statStreak">0</div><div class="stat-label">streak</div></div>
    </div>
  </div>

  <script>
    const hourR = {1:'ichiji',2:'niji',3:'sanji',4:'yoji',5:'goji',6:'rokuji',7:'shichiji',8:'hachiji',9:'kuji',10:'juuji',11:'juuichiji',12:'juuniji'};
    const hourH = {1:'いちじ',2:'にじ',3:'さんじ',4:'よじ',5:'ごじ',6:'ろくじ',7:'しちじ',8:'はちじ',9:'くじ',10:'じゅうじ',11:'じゅういちじ',12:'じゅうにじ'};
    const tensPrefixR = {0:'',1:'juu',2:'nijuu',3:'sanjuu',4:'yonjuu',5:'gojuu'};
    const tensPrefixH = {0:'',1:'じゅう',2:'にじゅう',3:'さんじゅう',4:'よんじゅう',5:'ごじゅう'};
    const onesSuffixR = {1:'ippun',2:'nifun',3:'sanpun',4:'yonpun',5:'gofun',6:'roppun',7:'nanafun',8:'happun',9:'kyuufun'};
    const onesSuffixH = {1:'いっぷん',2:'にふん',3:'さんぷん',4:'よんぷん',5:'ごふん',6:'ろっぷん',7:'ななふん',8:'はっぷん',9:'きゅうふん'};
    const tensZeroR = {1:'juppun',2:'nijuppun',3:'sanjuppun',4:'yonjuppun',5:'gojuppun'};
    const tensZeroH = {1:'じゅっぷん',2:'にじゅっぷん',3:'さんじゅっぷん',4:'よんじゅっぷん',5:'ごじゅっぷん'};
    const ampmR = { am: 'gozen', pm: 'gogo' };
    const ampmH = { am: 'ごぜん', pm: 'ごご' };

    function minutesR(m) {
      if (m === 0) return '';
      const t = Math.floor(m / 10), u = m % 10;
      if (u === 0) return tensZeroR[t];
      return tensPrefixR[t] + onesSuffixR[u];
    }

    function minutesH(m) {
      if (m === 0) return '';
      const t = Math.floor(m / 10), u = m % 10;
      if (u === 0) return tensZeroH[t];
      return tensPrefixH[t] + onesSuffixH[u];
    }

    function toRomaji(h, m, ap) {
      const prefix = ap ? ampmR[ap] + ' ' : '';
      const answers = new Set();
      answers.add(prefix + hourR[h] + minutesR(m));
      if (m === 30) answers.add(prefix + hourR[h] + 'han');
      return [...answers];
    }

    function toHiragana(h, m, ap) {
      const prefix = ap ? ampmH[ap] : '';
      return prefix + hourH[h] + minutesH(m) + (m === 30 ? '（はん）' : '');
    }

    let mode = 'time';
    let curH = 1, curM = 0, curAP = null;
    let correct = 0, wrong = 0, streak = 0;
    let answered = false;

    function randTime() {
      curH = Math.floor(Math.random() * 12) + 1;
      curM = Math.floor(Math.random() * 60);
      const roll = Math.random();
      curAP = roll < 0.5 ? null : (roll < 0.75 ? 'am' : 'pm');
    }

    function setMode(m) {
      mode = m;
      document.getElementById('modeTime').classList.toggle('active', m === 'time');
      document.getElementById('modeJp').classList.toggle('active', m === 'jp');
      nextQuestion();
    }

    function nextQuestion() {
      randTime();
      answered = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('acceptedLabel').textContent = '';
      document.getElementById('subHint').textContent = '';
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').disabled = false;

      const mm = String(curM).padStart(2, '0');
      const apBadge = curAP ? '<span class="ampm-badge">' + curAP.toUpperCase() + '</span>' : '';

      if (mode === 'time') {
        document.getElementById('promptLabel').textContent = 'What time is this in Japanese?';
        document.getElementById('numDisplay').innerHTML = '<span>' + curH + ':' + mm + '</span>' + apBadge;
        document.getElementById('answerInput').placeholder = curAP ? 'e.g. gozen ichiji sanjuugofun' : 'e.g. ichiji sanjuugofun';
      } else {
        document.getElementById('promptLabel').textContent = 'What time is this?';
        document.getElementById('numDisplay').textContent = toHiragana(curH, curM, curAP);
        document.getElementById('answerInput').placeholder = curAP ? 'e.g. AM 1:35' : 'e.g. 1:35';
      }

      document.getElementById('answerInput').focus();
    }

    function normalize(s) {
      return s.trim().toLowerCase().replace(/\s+/g, '');
    }

    function checkAnswer() {
      if (answered) { nextQuestion(); return; }
      const raw = document.getElementById('answerInput').value;
      if (!raw.trim()) return;

      answered = true;
      document.getElementById('answerInput').disabled = true;

      let isCorrect = false;
      const mm = String(curM).padStart(2, '0');

      if (mode === 'time') {
        const answers = toRomaji(curH, curM, curAP);
        isCorrect = answers.some(a => normalize(a) === normalize(raw));
        document.getElementById('subHint').textContent = toHiragana(curH, curM, curAP);
        if (!isCorrect) {
          document.getElementById('acceptedLabel').textContent = 'Accepted: ' + answers.join(' / ');
        }
        document.getElementById('feedback').textContent = isCorrect ? '正解！ Correct!' : '不正解。Answer: ' + answers[0];
      } else {
        const base = curH + ':' + mm;
        const answers = curAP ? [curAP + base, base + curAP] : [base];
        isCorrect = answers.some(a => normalize(a) === normalize(raw));
        const display = curAP ? curAP.toUpperCase() + ' ' + base : base;
        document.getElementById('feedback').textContent = isCorrect ? '正解！ Correct!' : '不正解。Answer: ' + display;
      }

      document.getElementById('feedback').className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
      if (isCorrect) { correct++; streak++; } else { wrong++; streak = 0; }
      document.getElementById('statCorrect').textContent = correct;
      document.getElementById('statWrong').textContent = wrong;
      document.getElementById('statStreak').textContent = streak;
    }

    document.getElementById('answerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });

    nextQuestion();
  </script>
</body>
</html>
