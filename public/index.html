<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nihongo Practice</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      color: #1a1a18;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      padding: 2rem 1.5rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    h1 {
      font-size: 18px;
      font-weight: 500;
      margin-bottom: 1.25rem;
      color: #1a1a18;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 1rem;
      border-radius: 12px;
      border: 1px solid #d0d0c8;
      background: #f9f9f6;
      color: #1a1a18;
      text-decoration: none;
      transition: background 0.15s;
    }

    .menu-item:hover { background: #f0f0ea; }

    .menu-icon { font-size: 28px; }

    .menu-text { display: flex; flex-direction: column; gap: 2px; }

    .menu-title { font-size: 15px; font-weight: 500; }

    .menu-sub { font-size: 12px; color: #888; }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a18; color: #f0f0ea; }
      .container { background: #2a2a26; box-shadow: none; }
      h1 { color: #f0f0ea; }
      .menu-item { background: #222220; border-color: #444440; color: #f0f0ea; }
      .menu-item:hover { background: #2a2a26; }
      .menu-sub { color: #aaa; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Nihongo practice 🎌</h1>
    <div class="menu">
      <a class="menu-item" href="numbers">
        <span class="menu-icon">🔢</span>
        <span class="menu-text">
          <span class="menu-title">Numbers</span>
          <span class="menu-sub">1 – 9999, both directions</span>
        </span>
      </a>
      <a class="menu-item" href="counters">
        <span class="menu-icon">🕐</span>
        <span class="menu-text">
          <span class="menu-title">Counters</span>
          <span class="menu-sub">Hours, age, class year</span>
        </span>
      </a>
    </div>
  </div>
</body>
</html>
