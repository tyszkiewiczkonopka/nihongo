<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nihongo Dojo — Numbers</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quiz.css">
</head>
<body>
  <div class="wrap">
    <div class="container">
      <header class="quiz-header">
        <a class="brand-home" href="./"><img class="brand-logo" src="favicon.png" alt="" /> Nihongo Dojo</a>
        <a class="hint-link" id="hintLink" target="_blank" rel="noopener" aria-label="Reference notes" title="Reference notes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M4 5a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2V5Z" />
            <path d="M20 5a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2V5Z" />
          </svg>
        </a>
      </header>
      <nav class="quiz-tabs">
        <a class="quiz-tab active" href="numbers">Numbers</a>
        <a class="quiz-tab" href="counters">Counters</a>
      </nav>

      <div class="controls">
        <div class="mode-toggle">
          <button class="mode-btn active" id="modeNum" onclick="setMode('num')">Number → Japanese</button>
          <button class="mode-btn" id="modeJp" onclick="setMode('jp')">Japanese → Number</button>
        </div>
      </div>

      <div class="card">
        <div class="prompt-label" id="promptLabel">How do you read this number in Japanese?</div>
        <div class="number-display" id="numDisplay">—</div>
        <div class="sub-hint" id="subHint"></div>
      </div>

      <div class="input-row">
        <input type="text" id="answerInput" placeholder="type your answer…" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="text" />
        <button class="btn-primary check-btn" onclick="checkAnswer()">Check</button>
      </div>
      <div class="feedback" id="feedback"></div>
      <div class="accepted" id="acceptedLabel"></div>
      <button class="next-btn btn-primary" onclick="nextQuestion()">Next →</button>

      <div class="stats">
        <div class="stat"><div class="stat-num" id="statCorrect">0</div><div class="stat-label">correct</div></div>
        <div class="stat"><div class="stat-num" id="statWrong">0</div><div class="stat-label">wrong</div></div>
      </div>
    </div>
  </div>

  <script src="notes.js"></script>
  <script>
    const note = NOTES.find(n => n.id === 'numbers-reference');
    document.getElementById('hintLink').href = note.href;

    const onesR = ['','ichi','ni','san','shi','go','roku','shichi','hachi','ku'];
    const hyakuR = {1:'hyaku',2:'nihyaku',3:'sanbyaku',4:'yonhyaku',5:'gohyaku',6:'roppyaku',7:'nanahyaku',8:'happyaku',9:'kyuuhyaku'};
    const senR = {1:'sen',2:'nisen',3:'sanzen',4:'yonsen',5:'gosen',6:'rokusen',7:'nanasen',8:'hassen',9:'kyuusen'};
    const digitsK = ['','一','二','三','四','五','六','七','八','九'];

    function getOnesR(u) {
      if (u === 4) return ['shi','yon'];
      if (u === 7) return ['shichi','nana'];
      if (u === 9) return ['ku','kyuu'];
      return [onesR[u]];
    }

    function getTensR(t) {
      if (t === 4) return 'yon';
      if (t === 7) return 'nana';
      if (t === 9) return 'kyuu';
      return onesR[t];
    }

    function toRomaji(n) {
      const results = new Set();
      const th = Math.floor(n / 1000); const rem3 = n % 1000;
      const h = Math.floor(rem3 / 100); const rem2 = rem3 % 100;
      const t = Math.floor(rem2 / 10); const u = rem2 % 10;
      const thPart = th ? senR[th] : '';
      const hPart = h ? hyakuR[h] : '';
      const tPart = t === 1 ? 'juu' : (t > 1 ? getTensR(t) + 'juu' : '');
      for (const uP of (u ? getOnesR(u) : [''])) results.add(thPart + hPart + tPart + uP);
      return [...results];
    }

    function toRomajiDisplay(n) {
      const results = new Set();
      const th = Math.floor(n / 1000); const rem3 = n % 1000;
      const h = Math.floor(rem3 / 100); const rem2 = rem3 % 100;
      const t = Math.floor(rem2 / 10); const u = rem2 % 10;
      const thPart = th ? senR[th] : '';
      const hPart = h ? hyakuR[h] : '';
      const tPart = t === 1 ? 'juu' : (t > 1 ? getTensR(t) + 'juu' : '');
      for (const uP of (u ? getOnesR(u) : [''])) results.add([thPart, hPart, tPart, uP].filter(Boolean).join(' '));
      return [...results];
    }

    function toKanji(n) {
      const th = Math.floor(n / 1000); const rem3 = n % 1000;
      const h = Math.floor(rem3 / 100); const rem2 = rem3 % 100;
      const t = Math.floor(rem2 / 10); const u = rem2 % 10;
      let s = '';
      if (th === 1) s += '千'; else if (th > 1) s += digitsK[th] + '千';
      if (h === 1) s += '百'; else if (h > 1) s += digitsK[h] + '百';
      if (t === 1) s += '十'; else if (t > 1) s += digitsK[t] + '十';
      if (u) s += digitsK[u];
      return s;
    }

    let mode = 'num';
    let current = 0;
    let correct = 0, wrong = 0;
    let answered = false;

    function randNum() {
      return Math.floor(Math.random() * 9999) + 1;
    }

    function setMode(m) {
      mode = m;
      document.getElementById('modeNum').classList.toggle('active', m === 'num');
      document.getElementById('modeJp').classList.toggle('active', m === 'jp');
      nextQuestion();
    }

    function nextQuestion() {
      current = randNum();
      answered = false;
      document.getElementById('feedback').textContent = '';
      document.getElementById('feedback').className = 'feedback';
      document.getElementById('acceptedLabel').textContent = '';
      document.getElementById('subHint').textContent = '';
      document.getElementById('answerInput').value = '';
      document.getElementById('answerInput').disabled = false;
      document.getElementById('answerInput').readOnly = false;

      if (mode === 'num') {
        document.getElementById('promptLabel').textContent = 'How do you read this number in Japanese?';
        document.getElementById('numDisplay').textContent = current;
        document.getElementById('answerInput').placeholder = 'e.g. juuichi…';
        document.getElementById('answerInput').inputMode = 'text';
      } else {
        document.getElementById('promptLabel').textContent = 'What number is this?';
        document.getElementById('numDisplay').textContent = toKanji(current);
        document.getElementById('answerInput').placeholder = 'type the number…';
        document.getElementById('answerInput').inputMode = 'numeric';
      }

      document.getElementById('answerInput').focus();
    }

    function normalize(s) {
      return s.trim().toLowerCase().replace(/\s+/g, '').replace(/ō/g, 'oo').replace(/ū/g, 'uu');
    }

    function checkAnswer() {
      if (answered) { nextQuestion(); return; }
      const raw = document.getElementById('answerInput').value;
      if (!raw.trim()) return;

      answered = true;
      document.getElementById('answerInput').readOnly = true;

      let isCorrect = false;

      if (mode === 'num') {
        const answers = toRomaji(current);
        const answersDisplay = toRomajiDisplay(current);
        isCorrect = answers.some(a => normalize(a) === normalize(raw));
        document.getElementById('subHint').textContent = toKanji(current);
        if (!isCorrect && answersDisplay.length > 1) {
          document.getElementById('acceptedLabel').textContent = 'Accepted: ' + answersDisplay.join(' / ');
        }
        document.getElementById('feedback').textContent = isCorrect ? '正解！ Correct!' : '不正解。Answer: ' + answersDisplay[0];
      } else {
        isCorrect = parseInt(raw.trim()) === current;
        document.getElementById('feedback').textContent = isCorrect ? '正解！ Correct!' : '不正解。Answer: ' + current;
      }

      document.getElementById('feedback').className = 'feedback ' + (isCorrect ? 'correct' : 'wrong');
      if (isCorrect) { correct++; } else { wrong++; }
      document.getElementById('statCorrect').textContent = correct;
      document.getElementById('statWrong').textContent = wrong;
    }

    document.getElementById('answerInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') checkAnswer();
    });

    nextQuestion();
  </script>
</body>
</html>
